name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Build extension
        run: pnpm run build
      
      - name: Create Chrome ZIP
        run: |
          cd dist
          zip -r ../frontend-dev-helper-chrome.zip .
          cd ..
      
      - name: Create Firefox ZIP
        run: |
          # Modify manifest for Firefox (Manifest V2 compatibility)
          cd dist
          # Convert service_worker to scripts for Firefox MV2
          cat manifest.json | sed 's/"service_worker": "\([^"]*\)"/"scripts": ["\1"]/' > manifest-firefox.json
          mv manifest-firefox.json manifest.json
          zip -r ../frontend-dev-helper-firefox.zip .
          cd ..
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            frontend-dev-helper-chrome.zip
            frontend-dev-helper-firefox.zip
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
