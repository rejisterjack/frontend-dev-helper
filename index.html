<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="FrontendDevHelper - Essential tools for frontend developers" />
    <meta name="theme-color" content="#3b82f6" />
    
    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Inter font for UI -->
    <link 
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" 
      rel="stylesheet" 
    />
    
    <!-- JetBrains Mono for code -->
    <link 
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" 
      rel="stylesheet" 
    />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/icons/icon-32.png" />
    
    <title>FrontendDevHelper</title>
    
    <style>
      /* Critical CSS for instant render */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      html {
        width: 400px;
        height: 580px;
        max-height: 600px;
      }
      
      body {
        width: 400px;
        height: 580px;
        max-height: 600px;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        margin: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      
      #root {
        flex: 1 1 0;
        min-width: 0;
        min-height: 0;
        width: 100%;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      
      /* Loading state */
      .loading-screen {
        display: flex;
        align-items: center;
        justify-content: center;
        flex: 1 1 0;
        min-height: 0;
        width: 100%;
        background: #ffffff;
      }
      
      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #e5e7eb;
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Loading screen shown before React mounts -->
      <div class="loading-screen">
        <div class="loading-spinner" role="status" aria-label="Loading FrontendDevHelper...">
          <span class="sr-only">Loading...</span>
        </div>
      </div>
    </div>
    
    <!-- Main React entry point -->
    <script type="module" src="/src/popup/index.tsx"></script>
  </body>
</html>
